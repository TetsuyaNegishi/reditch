<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reditch — 画像注釈ツール</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header id="toolbar">
    <div class="toolbar-group" id="tool-buttons" role="toolbar" aria-label="ツール">
      <button class="tool-btn active" data-tool="select" title="選択・移動 (V)">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 3l12 9-5.5 1L15 19l-2.5 1-2.5-6-4 3.5z" fill="currentColor"/></svg>
      </button>
      <button class="tool-btn" data-tool="arrow" title="矢印 (A)">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 20L14 10m0 0l-4.2.8M14 10l-.8 4.2M13 4l7-1-1 7" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="line" title="直線 (L)">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 19L19 5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="rect" title="四角形 (R)">
        <svg viewBox="0 0 24 24" width="20" height="20"><rect x="4" y="6" width="16" height="12" rx="1.5" stroke="currentColor" stroke-width="2.4" fill="none"/></svg>
      </button>
      <button class="tool-btn" data-tool="ellipse" title="楕円 (O)">
        <svg viewBox="0 0 24 24" width="20" height="20"><ellipse cx="12" cy="12" rx="8.5" ry="6.5" stroke="currentColor" stroke-width="2.4" fill="none"/></svg>
      </button>
      <button class="tool-btn" data-tool="pen" title="ペン (P)">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 20c0-4 2-9 6-9s2 7 6 5 4-8 4-8" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="text" title="テキスト (T)">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 6V4h14v2M12 4v16m-3 0h6" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>
      </button>
      <button class="tool-btn" data-tool="mosaic" title="モザイク (M)">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 4h5v5H4zM15 4h5v5h-5zM9.5 9.5h5v5h-5zM4 15h5v5H4zM15 15h5v5h-5z" fill="currentColor" opacity=".85"/></svg>
      </button>
    </div>

    <div class="toolbar-sep"></div>

    <div class="toolbar-group" id="color-swatches" aria-label="色">
      <button class="swatch active" data-color="#f03e3e" style="--c:#f03e3e" title="レッド"></button>
      <button class="swatch" data-color="#f76707" style="--c:#f76707" title="オレンジ"></button>
      <button class="swatch" data-color="#ffd43b" style="--c:#ffd43b" title="イエロー"></button>
      <button class="swatch" data-color="#37b24d" style="--c:#37b24d" title="グリーン"></button>
      <button class="swatch" data-color="#1c7ed6" style="--c:#1c7ed6" title="ブルー"></button>
      <button class="swatch" data-color="#ae3ec9" style="--c:#ae3ec9" title="パープル"></button>
      <button class="swatch" data-color="#f783ac" style="--c:#f783ac" title="ピンク"></button>
      <button class="swatch" data-color="#212529" style="--c:#212529" title="ブラック"></button>
      <button class="swatch" data-color="#ffffff" style="--c:#ffffff" title="ホワイト"></button>
    </div>

    <div class="toolbar-sep"></div>

    <div class="toolbar-group" id="size-controls">
      <label class="size-label" title="線の太さ">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 18h16M4 12h16M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity=".7"/></svg>
        <select id="line-width">
          <option value="3">細</option>
          <option value="6" selected>中</option>
          <option value="10">太</option>
          <option value="16">極太</option>
        </select>
      </label>
      <label class="size-label" title="文字サイズ">
        <span class="size-icon">T</span>
        <select id="font-size">
          <option value="20">小</option>
          <option value="32" selected>中</option>
          <option value="48">大</option>
          <option value="72">特大</option>
        </select>
      </label>
    </div>

    <div class="toolbar-sep"></div>

    <div class="toolbar-group" id="history-buttons">
      <button id="btn-undo" class="action-btn" title="元に戻す (⌘Z)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M8 5L3 10l5 5M3 10h11a6 6 0 016 6v1" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="btn-redo" class="action-btn" title="やり直す (⇧⌘Z)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M16 5l5 5-5 5M21 10H10a6 6 0 00-6 6v1" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="toolbar-spacer"></div>

    <div class="toolbar-group" id="file-buttons">
      <button id="btn-capture" class="action-btn labeled electron-only" title="範囲を指定してキャプチャ (⌘⇧7)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 8V5a1 1 0 011-1h3M16 4h3a1 1 0 011 1v3M20 16v3a1 1 0 01-1 1h-3M8 20H5a1 1 0 01-1-1v-3" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round"/><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        <span>キャプチャ</span>
      </button>
      <div id="drag-out" class="electron-only" draggable="true" title="ドラッグして他のアプリへ共有（Finder・Slack等）">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 6h.01M15 6h.01M9 12h.01M15 12h.01M9 18h.01M15 18h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
        <span>ドラッグで共有</span>
      </div>
      <button id="btn-open" class="action-btn labeled" title="画像を開く">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 19h16M12 4v10m0 0l-4-4m4 4l4-4" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="rotate(180 12 11.5)"/></svg>
        <span>開く</span>
      </button>
      <button id="btn-copy" class="action-btn labeled" title="クリップボードへコピー">
        <svg viewBox="0 0 24 24" width="18" height="18"><rect x="8" y="8" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><path d="M16 8V6a2 2 0 00-2-2H6a2 2 0 00-2 2v8a2 2 0 002 2h2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
        <span>コピー</span>
      </button>
      <button id="btn-save" class="action-btn labeled primary" title="PNGとして保存">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 4v10m0 0l-4-4m4 4l4-4M4 19h16" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>保存</span>
      </button>
    </div>
  </header>

  <main id="stage">
    <div id="canvas-wrapper">
      <canvas id="canvas"></canvas>
      <textarea id="text-editor" spellcheck="false" placeholder="テキストを入力"></textarea>
      <div id="drop-hint">
        <div class="drop-hint-inner">
          <div class="drop-icon">🖼️</div>
          <p class="drop-title">画像をここにドラッグ&ドロップ</p>
          <p class="drop-sub">または ⌘V で貼り付け / <button id="btn-open-inline" class="link-btn">ファイルを選択</button></p>
        </div>
      </div>
    </div>
  </main>

  <footer id="status-bar">
    <span id="status-message">画像を読み込んで注釈を付けましょう</span>
    <span id="image-info"></span>
  </footer>

  <input type="file" id="file-input" accept="image/*" hidden>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
